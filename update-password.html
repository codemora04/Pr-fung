<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe - Système d'Audit</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="logo4.png">
  <meta name="theme-color" content="#0f172a">
  <link rel="stylesheet" href="style.css">
</head>
<script src="./pwa.js"></script>

<body class="page-login">
  <a href="login.html" class="back-link" id="back-login">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Connexion
  </a>

  <form id="updatePasswordForm" class="auth-form hidden">
    <div class="login-icon" aria-hidden="true">#</div>
    <h2>Nouveau mot de passe</h2>
    <p class="login-subtitle">Choisissez un mot de passe sécurisé pour votre compte.</p>

    <div class="password-wrapper">
      <input type="password" id="newPassword" placeholder="Nouveau mot de passe" autocomplete="new-password" minlength="8" required>
      <button type="button" id="togglePassword" class="toggle-password" aria-label="Afficher le mot de passe">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      </button>
    </div>

    <button type="submit" class="btn-retour">Mettre à jour</button>
    <p class="success" id="success"></p>
    <p class="error" id="error"></p>
  </form>

  <div id="recoveryStatus" class="auth-form">
    <div class="login-icon" aria-hidden="true">...</div>
    <h2>Vérification du lien</h2>
    <p class="login-subtitle" id="statusText">Validation de votre session de récupération.</p>
    <p class="error" id="statusError"></p>
    <a href="forgot-password.html" class="auth-link hidden" id="requestNewLink">Demander un nouveau lien</a>
  </div>

  <script>
    document.getElementById('togglePassword').addEventListener('click', function () {
      const passwordInput = document.getElementById('newPassword');
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.setAttribute('aria-label', type === 'password' ? 'Afficher le mot de passe' : 'Masquer le mot de passe');
    });
  </script>

  <script type="module">
    import { supabase } from "./supabase.js";

    const form = document.getElementById("updatePasswordForm");
    const statusBox = document.getElementById("recoveryStatus");
    const statusText = document.getElementById("statusText");
    const statusError = document.getElementById("statusError");
    const requestNewLink = document.getElementById("requestNewLink");
    const errorEl = document.getElementById("error");
    const successEl = document.getElementById("success");

    let recoverySessionReady = false;

    const showForm = () => {
      recoverySessionReady = true;
      statusBox.classList.add("hidden");
      form.classList.remove("hidden");
    };

    const showInvalidLink = (message) => {
      statusText.textContent = "";
      statusError.textContent = message;
      requestNewLink.classList.remove("hidden");
    };

    const detectUrlError = () => {
      const searchParams = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
      const error = searchParams.get("error") || hashParams.get("error");
      const description = searchParams.get("error_description") || hashParams.get("error_description");

      if (!error && !description) return null;
      if (`${error} ${description}`.toLowerCase().includes("expired")) {
        return "Ce lien de récupération a expiré. Demandez un nouveau lien.";
      }
      return "Ce lien de récupération est invalide. Demandez un nouveau lien.";
    };

    const waitForRecoverySession = async () => {
      const urlError = detectUrlError();
      if (urlError) {
        showInvalidLink(urlError);
        return;
      }

      const { data: sessionData } = await supabase.auth.getSession();
      if (sessionData?.session) {
        showForm();
        return;
      }

      const { data: listener } = supabase.auth.onAuthStateChange((event, session) => {
        if (event === "PASSWORD_RECOVERY" && session) {
          showForm();
          listener.subscription.unsubscribe();
        }
      });

      window.setTimeout(() => {
        if (!recoverySessionReady) {
          listener.subscription.unsubscribe();
          showInvalidLink("Session invalide ou expirée. Demandez un nouveau lien de réinitialisation.");
        }
      }, 3500);
    };

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.textContent = "";
      successEl.textContent = "";

      if (!recoverySessionReady) {
        errorEl.textContent = "Session invalide ou expirée. Demandez un nouveau lien.";
        return;
      }

      const newPassword = document.getElementById("newPassword").value;
      if (newPassword.length < 8) {
        errorEl.textContent = "Le mot de passe doit contenir au moins 8 caractères.";
        return;
      }

      const btn = form.querySelector('button[type="submit"]');
      const originalText = btn.textContent;
      btn.textContent = "Mise à jour...";
      btn.disabled = true;

      const { error } = await supabase.auth.updateUser({ password: newPassword });

      if (error) {
        errorEl.textContent = error.message?.toLowerCase().includes("session")
          ? "Session invalide ou expirée. Demandez un nouveau lien."
          : "Impossible de mettre à jour le mot de passe. Réessayez.";
        btn.textContent = originalText;
        btn.disabled = false;
        return;
      }

      successEl.textContent = "Mot de passe mis à jour. Redirection vers la connexion...";
      await supabase.auth.signOut();
      window.setTimeout(() => {
        window.location.href = "login.html";
      }, 900);
    });

    waitForRecoverySession();
  </script>
</body>
</html>
