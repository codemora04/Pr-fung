<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié - Système d'Audit</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="logo4.png">
  <meta name="theme-color" content="#0f172a">
  <link rel="stylesheet" href="style.css">
</head>
<script src="./pwa.js"></script>

<body class="page-login">
  <a href="login.html" class="back-link" id="back-login">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Retour
  </a>

  <form id="passwordRecoveryForm" class="auth-form">
    <div class="login-icon" aria-hidden="true">?</div>
    <h2>Mot de passe oublié</h2>
    <p class="login-subtitle">Entrez votre email pour recevoir un lien de réinitialisation.</p>

    <input type="email" id="email" placeholder="Email" autocomplete="email" required>
    <button type="submit" class="btn-retour">Envoyer le lien</button>
    <p class="success" id="success"></p>
    <p class="error" id="error"></p>
  </form>

  <script type="module">
    import { supabase } from "./supabase.js";

    const form = document.getElementById("passwordRecoveryForm");
    const errorEl = document.getElementById("error");
    const successEl = document.getElementById("success");

    const getRedirectUrl = () => {
      // Construct absolute URL to the password update page.
      // Using origin ensures we always point to the correct domain and avoids double slashes.
      return `${window.location.origin}/update-password.html`;
    };

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.textContent = "";
      successEl.textContent = "";

      const btn = form.querySelector('button[type="submit"]');
      const originalText = btn.textContent;
      btn.textContent = "Envoi...";
      btn.disabled = true;

      const email = document.getElementById("email").value.trim();
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: getRedirectUrl(),
      });

      if (error) {
        errorEl.textContent = "Impossible d'envoyer le lien. Vérifiez l'email puis réessayez.";
        btn.textContent = originalText;
        btn.disabled = false;
        return;
      }

      successEl.textContent = "Si cet email existe, un lien de réinitialisation vient d'être envoyé.";
      btn.textContent = originalText;
      btn.disabled = false;
    });
  </script>
</body>
</html>
